<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GymGuide</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1115;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    .auth-card {
      width: min(420px, 92vw);
      background: #171a21;
      border: 1px solid #2a2f3a;
      border-radius: 18px;
      padding: 32px;
      box-sizing: border-box;
    }

    .auth-card h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: #a7afbd;
      line-height: 1.6;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .auth-form label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: #c8d0dc;
    }

    .auth-form input {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #303645;
      background: #0f131a;
      color: #fff;
      font-size: 14px;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #d7ff3f;
    }

    .auth-form button {
      margin-top: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d7ff3f;
      color: #111;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .auth-links {
      margin-top: 18px;
      font-size: 14px;
      color: #a7afbd;
    }

    .auth-links a {
      color: #d7ff3f;
      text-decoration: none;
    }

    .mensagem {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #222834;
      border: 1px solid #31394a;
      color: #d7ff3f;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>Login</h1>
    <p>Entre na sua conta para acessar seus recursos do GymGuide.</p>

    {% if mensagem %}
      <div class="mensagem">{{ mensagem }}</div>
    {% endif %}

    <form class="auth-form" method="POST" action="/login">
      <label>
        Email
        <input type="email" name="email" placeholder="seuemail@gmail.com" required>
      </label>

      <label>
        Senha
        <input type="password" name="password" placeholder="Digite sua senha" required>
      </label>

      <button type="submit">Entrar</button>
    </form>

    <div class="auth-links">
      Não tem conta? <a href="/cadastro">Criar cadastro</a>
    </div>
  </div>
</body>
</html>
